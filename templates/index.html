<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor | ML Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0b0f1a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient glow background */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 560px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem 2.5rem;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05) inset,
                0 25px 60px -12px rgba(0,0,0,0.5);
        }

        /* Subtle top-edge highlight */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(165,140,255,0.4), transparent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99,102,241,0.12);
            border: 1px solid rgba(99,102,241,0.2);
            color: #a5b4fc;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 100px;
            margin-bottom: 1.25rem;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #818cf8;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(129,140,248,0.6);
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #f1f5f9, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.92rem;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 2.25rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.1rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 0.02em;
        }

        .input-group label svg {
            opacity: 0.5;
        }

        .input-group input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: #f1f5f9;
            outline: none;
            transition: all 0.25s ease;
        }

        .input-group input::placeholder {
            color: #475569;
            font-weight: 400;
        }

        .input-group input:hover {
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
        }

        .input-group input:focus {
            border-color: rgba(129,140,248,0.5);
            background: rgba(99,102,241,0.06);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1), 0 0 20px rgba(99,102,241,0.05);
        }

        /* Remove number input spinners */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        button {
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.9rem 1.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3), 0 0 0 1px rgba(255,255,255,0.1) inset;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            pointer-events: none;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.4), 0 0 0 1px rgba(255,255,255,0.15) inset;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .btn-content { display: none; }
        button.loading .spinner { display: block; }

        #result {
            display: none;
            margin-top: 1.5rem;
            padding: 1.1rem 1.25rem;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.95rem;
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #result.success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            color: #6ee7b7;
        }

        #result.success .price {
            display: block;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-top: 4px;
            background: linear-gradient(135deg, #6ee7b7, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #result.error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.72rem;
            color: #334155;
            letter-spacing: 0.04em;
        }

        @media (max-width: 540px) {
            body { padding: 1rem; }
            .card { padding: 2rem 1.5rem 1.75rem; border-radius: 20px; }
            .form-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
</style>
</head>
<body>
    <div class="card">
        <div class="badge">ML-Powered</div>
        <h1>House Price Predictor</h1>
        <p class="subtitle">Enter property details for an instant AI-driven valuation</p>

        <div class="form-grid">
            <div class="input-group">
                <label for="sqft">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
                    Square Footage
                </label>
                <input type="number" id="sqft" placeholder="2,000" min="1000" max="5000">
            </div>
            <div class="input-group">
                <label for="bedrooms">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v11a2 2 0 002 2h14a2 2 0 002-2V7"/><path d="M21 7H3l2-4h14l2 4z"/><path d="M7 11h10v4H7z"/></svg>
                    Bedrooms
                </label>
                <input type="number" id="bedrooms" placeholder="3" min="1" max="5">
            </div>
            <div class="input-group">
                <label for="bathrooms">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16a1 1 0 011 1v3a4 4 0 01-4 4H7a4 4 0 01-4-4v-3a1 1 0 011-1z"/><path d="M6 12V5a2 2 0 012-2h1"/></svg>
                    Bathrooms
                </label>
                <input type="number" id="bathrooms" placeholder="2" min="1" max="3" step="0.5">
            </div>
            <div class="input-group">
                <label for="year">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                    Year Built
                </label>
                <input type="number" id="year" placeholder="2005" min="1960" max="2023">
            </div>
        </div>

        <button id="predictButton" onclick="makePrediction()">
            <span class="btn-content">
                <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span id="buttonText">Get Estimate</span>
            </span>
            <span class="spinner" id="spinner"></span>
        </button>

        <div id="result"></div>
    </div>

    <p class="footer">Powered by RandomForest · Trained on synthetic market data</p>

    <script>
        const predictButton = document.getElementById('predictButton');
        const buttonText = document.getElementById('buttonText');
        const resultDiv = document.getElementById('result');

        async function makePrediction() {
            const sqft = parseFloat(document.getElementById('sqft').value);
            const bedrooms = parseFloat(document.getElementById('bedrooms').value);
            const bathrooms = parseFloat(document.getElementById('bathrooms').value);
            const year = parseFloat(document.getElementById('year').value);

            if (!sqft || !bedrooms || !bathrooms || !year) {
                showResult('Please fill in all fields with valid numbers.', 'error');
                return;
            }

            predictButton.disabled = true;
            predictButton.classList.add('loading');
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features: [sqft, bedrooms, bathrooms, year] })
                });

                if (!response.ok) throw new Error('Prediction failed');

                const data = await response.json();
                const price = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    maximumFractionDigits: 0
                }).format(data.prediction[0]);

                resultDiv.innerHTML = `Estimated Value<span class="price">${price}</span>`;
                resultDiv.className = 'success';
                resultDiv.style.display = 'block';
            } catch (error) {
                showResult('Something went wrong. Please try again.', 'error');
            } finally {
                predictButton.disabled = false;
                predictButton.classList.remove('loading');
            }
        }

        function showResult(message, type) {
            resultDiv.textContent = message;
            resultDiv.className = type;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
